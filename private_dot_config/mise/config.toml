[settings]
idiomatic_version_file_enable_tools = ["ruby"]

[env]
_.python.venv = { path = "{{config_root}}/.venv", create = true }

[tool_alias]
makejinja = "pipx:makejinja"
gh-cli = "aqua:cli/cli"
age = "aqua:FiloSottile/age"
sops = "aqua:getsops/sops"
task = "aqua:go-task/task"
jq = "aqua:jqlang/jq"
yq = "aqua:mikefarah/yq"
opencode = "aqua:anomalyco/opencode"
1password-cli = "aqua:1password/cli"

bat = "aqua:sharkdp/bat"
atuin = "aqua:atuinsh/atuin"
chezmoi = "aqua:twpayne/chezmoi"
carapace = "aqua:carapace-sh/carapace-bin"
direnv = "aqua:direnv/direnv"
fzf = "aqua:junegunn/fzf"
lazygit = "aqua:jesseduffield/lazygit"
rclone = "aqua:rclone/rclone"
yamlfmt = "aqua:google/yamlfmt"
exa = "aqua:ogham/exa"
treefmt = "aqua:numtide/treefmt"

